# /etc/nginx/sites-available/logiseo.conf
# Application : LOGI SEO Booster (projet Docker "logiseo")
# NE PAS modifier les autres fichiers nginx du VPS.
# Certbot ajoutera automatiquement le bloc 443/SSL :
#   sudo certbot --nginx -d seo.logitrak.ch

server {
    listen 80;
    listen [::]:80;
    server_name seo.logitrak.ch;

    client_max_body_size 25m;
    access_log /opt/logi-seo-booster/logs/nginx/access.log;
    error_log  /opt/logi-seo-booster/logs/nginx/error.log;

    # Backend FastAPI (conteneur logiseo_backend -> 127.0.0.1:8105)
    location /api {
        proxy_pass http://127.0.0.1:8105;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Frontend React (conteneur logiseo_frontend -> 127.0.0.1:3105)
    location / {
        proxy_pass http://127.0.0.1:3105;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
